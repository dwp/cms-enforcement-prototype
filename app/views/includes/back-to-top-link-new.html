{# btt-container wraps button and forces the link to dynamically track your <main> content boundaries instead of arbitrary viewport edges  #}
<div class="btt-container">
  <!-- Added 'hidden' attribute by default so it does not accept keyboard focus until visible -->
  <a href="#pageTop" id="backToTop" class="back-to-top" aria-label="Back to top" hidden>
    <svg aria-hidden="true" viewBox="0 0 24 24" width="18" height="18">
      <!-- Fixed: Removed inline fill attribute so SCSS currentColor works perfectly -->
      <path d="M4 12l1.41 1.41L11 7.83V20h2V7.83l5.58 5.59L20 12l-8-8-8 8z"/>
    </svg>
    <!-- NN/g Requirement: Explicit text label for clarity -->
    <span class="btn-text">Back to Top</span>
  </a>
</div>
